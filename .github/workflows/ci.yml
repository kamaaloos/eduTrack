name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-lint:
    name: Test & lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Lint
        run: npm run lint
        env:
          # Expo lint loads env; CI has no secrets — placeholders satisfy config loaders.
          EXPO_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          EXPO_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
